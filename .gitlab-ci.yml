image: alpine:latest

stages:
  - build
  - push
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  ECR_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  ECR_IMAGE: $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG

default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

before_script:
  - apk add --no-cache docker-cli aws-cli curl
  - echo "Assuming AWS IAM role using GitLab OIDC"
  - |
    CREDS=$(aws sts assume-role-with-web-identity \
      --role-arn "$AWS_ROLE_ARN" \
      --role-session-name "gitlab-ecr-session-$CI_PIPELINE_ID" \
      --web-identity-token "$GITLAB_OIDC_TOKEN" \
      --duration-seconds 3600 \
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
      --output text)

    export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | awk '{print $1}')
    export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | awk '{print $2}')
    export AWS_SESSION_TOKEN=$(echo "$CREDS" | awk '{print $3}')

  - echo "Logging in to Amazon ECR"
  - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

build_image:
  stage: build
  tags:
    - ec2-docker-runner
  script:
    - echo "Building Docker image on EC2 runner"
    - docker build -t $ECR_IMAGE .
    - docker images

push_image:
  stage: push
  tags:
    - ec2-docker-runner
  script:
    - echo "Pushing image to Amazon ECR"
    - docker push $ECR_IMAGE

deploy_from_ecr:
  stage: deploy
  tags:
    - ec2-docker-runner
  script:
    - echo "Removing old container"
    - docker rm -f flappy-game || true

    - echo "Removing local image to prove we are not relying on runner cache"
    - docker rmi $ECR_IMAGE || true

    - echo "Pulling image from ECR"
    - docker pull $ECR_IMAGE

    - echo "Running container from ECR image"
    - docker run -d --restart unless-stopped --name flappy-game -p 80:5000 $ECR_IMAGE

    - docker ps
    - |
      for i in 1 2 3 4 5; do
        curl -f http://$EC2_PUBLIC_IP/health && exit 0
        echo "App not ready yet, retrying..."
        sleep 5
      done
      
      echo "Health check failed after 5 attempts"
      exit 1
